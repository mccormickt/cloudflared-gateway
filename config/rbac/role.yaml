kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
  - list
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
  - delete
  - get
  - list
  - update
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - update
- apiGroups:
  - cloudflare.jan0ski.net
  resources:
  - cloudflareaccesspolicies
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - cloudflare.jan0ski.net
  resources:
  - cloudflareaccesspolicies/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
