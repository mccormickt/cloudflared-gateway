# Controller image
image:
  repository: ghcr.io/mccormickt/cloudflared-gateway
  tag: ""                  # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []

replicaCount: 1

# The GatewayClass controllerName this controller claims.
controllerName: jan0ski.net/cloudflared-gateway

# Cloudflare credentials.
# Either provide them inline (a Secret will be created) OR set existingSecret
# to the name of a pre-existing Secret with keys `account-id` and `api-token`.
cloudflare:
  accountId: ""
  apiToken: ""
  existingSecret: ""

serviceAccount:
  create: true
  name: ""                 # defaults to the release fullname
  annotations: {}

rbac:
  create: true             # creates ClusterRole + ClusterRoleBinding

# Pod-level security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# Container-level security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: true

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}
podLabels: {}

# Extra env vars for the manager container (merged after CF creds).
extraEnv: []

# Experimental features.
experimental:
  backends:
    # Enable support for the experimental Gateway API XBackend resource
    # (gateway.networking.x-k8s.io), letting HTTPRoute/GRPCRoute/TLSRoute/TCPRoute
    # target external FQDN destinations. Requires the XBackend CRD to be installed
    # (the controller fails fast at startup otherwise).
    enabled: false

  # Opt-in: install the upstream Gateway API CRDs (experimental channel) via a
  # pre-install/pre-upgrade hook Job. Off by default — most operators install
  # CRDs out of band. When enabled, the hook server-side-applies the pinned
  # experimental-install.yaml and grants itself temporary CRD-management RBAC.
  installGatewayAPICRDs: false

  # Gateway API version the CRD-install hook applies. Must be a version that
  # ships the XBackend CRD when experimental.backends.enabled is true.
  gatewayAPIVersion: v1.6.0-rc.1

  # Image used by the CRD-install hook Job (must contain kubectl).
  crdInstaller:
    image: registry.k8s.io/kubectl:v1.34.1
